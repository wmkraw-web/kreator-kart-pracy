<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>EduKarty AI - Kreator Kart Pracy</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Montserrat:wght@400;700;900&display=swap');
        
        body { background-color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        
        .tracing-text {
            font-family: 'Comic Neue', cursive;
            color: transparent;
            -webkit-text-stroke: 1.5px #94a3b8;
            letter-spacing: 0.2em;
        }

        .math-text {
            font-family: 'Comic Neue', cursive;
            font-weight: bold;
            color: #334155;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; border: none !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important;}
            .print-hidden { display: none !important; }
            body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background: white; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- IKONY ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Sparkles: <path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.21 1.21 0 0 0 1.72 0L21.64 5.36a1.21 1.21 0 0 0 0-1.72ZM14 7l3 3M5 6v1M19 2v1M10 2v2M7 10H6M22 9h-2M15 2h1"/>,
                Key: <path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3y-3.5L15.5 7.5z"/>,
                Lock: (<><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>),
                Trash2: (<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>),
                Calculator: (<><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></>),
                Type: (<><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></>),
                Layout: (<><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>)
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- TARCZA OCHRONNA (System ponawiania pobierania obrazka) ---
        const fetchImageWithRetry = async (url, maxRetries = 3) => {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, { cache: "no-store" });
                    if (response.ok) {
                        return await response.blob();
                    } else {
                        console.warn(`Próba ${i + 1}: Serwer AI zablokował zapytanie.`);
                    }
                } catch (error) {
                    console.warn(`Próba ${i + 1}: Błąd połączenia internetowego.`);
                }
                
                if (i < maxRetries - 1) {
                    // Czekamy 2 sekundy przed kolejną próbą
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
            }
            throw new Error("Serwer AI jest przeciążony. Spróbuj ponownie.");
        };

        function App() {
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            
            // Dane Karty Pracy
            const [worksheetTitle, setWorksheetTitle] = useState('KARTA PRACY');
            const [worksheetSubtitle, setWorksheetSubtitle] = useState('Imię i nazwisko: ........................................');
            
            // Elementy na karcie (Bloki)
            const [elements, setElements] = useState([
                { id: 1, type: 'tracing', text: 'WIOSNA' },
                { id: 2, type: 'math', data: ['5 + 3 = ...', '7 - 2 = ...', '4 + 4 = ...', '9 - 5 = ...'] }
            ]);

            // Stan modułu AI
            const [aiPrompt, setAiPrompt] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [aiError, setAiError] = useState(null);

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { 
                    setIsPremium(true); 
                    setAccessCode(''); 
                } else { 
                    alert('Nieprawidłowy kod!'); 
                }
            };

            // Dodawanie bloków
            const addMathBlock = () => {
                const generateEq = () => {
                    const op = Math.random() > 0.5 ? '+' : '-';
                    const a = Math.floor(Math.random() * 10) + 1;
                    const b = Math.floor(Math.random() * a); 
                    return op === '+' ? `${a} + ${b} = ...` : `${a} - ${b} = ...`;
                };
                const newMath = [generateEq(), generateEq(), generateEq(), generateEq()];
                setElements([...elements, { id: Date.now(), type: 'math', data: newMath }]);
            };

            const addTracingBlock = () => {
                setElements([...elements, { id: Date.now(), type: 'tracing', text: 'WPISZ TEKST' }]);
            };

            const addSpacer = () => {
                setElements([...elements, { id: Date.now(), type: 'spacer' }]);
            };

            const updateElementText = (id, newText) => {
                setElements(elements.map(el => el.id === id ? { ...el, text: newText } : el));
            };

            const removeElement = (id) => {
                setElements(elements.filter(el => el.id !== id));
            };

            // Generowanie Kolorowanki AI
            const handleGenerateAiImage = async () => {
                if (!aiPrompt.trim()) return;
                setIsGenerating(true);
                setAiError(null);
                
                let translatedPrompt = aiPrompt;
                
                // Tłumaczenie na angielski (dla lepszych efektów AI)
                try {
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(aiPrompt)}&langpair=pl|en`);
                    const data = await res.json();
                    if (data && data.responseData && data.responseData.translatedText) {
                        if(!data.responseData.translatedText.includes("MYMEMORY WARNING")){
                            translatedPrompt = data.responseData.translatedText;
                        }
                    }
                } catch(e) {
                    console.log("Błąd tłumaczenia, używamy oryginału");
                }

                // Ścisłe wymuszenie kolorowanki (bez cieni, czarno-białe)
                const fullPrompt = `${translatedPrompt}, black and white coloring page for kids, line art, simple outlines, pure white background, no shading, monochrome`;
                
                try {
                    const seed = Math.floor(Math.random() * 1000000);
                    const encodedPrompt = encodeURIComponent(fullPrompt);
                    const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1024&height=1024&nologo=true&seed=${seed}&model=flux&r=${Date.now()}`;
                    
                    // UŻYCIE TARCZY OCHRONNEJ
                    const blob = await fetchImageWithRetry(imageUrl, 3);
                    const objectUrl = URL.createObjectURL(blob);
                    
                    // Dodanie wygenerowanego obrazka do karty
                    setElements([...elements, { id: Date.now(), type: 'ai_image', src: objectUrl }]);
                    setAiPrompt('');
                    setIsGenerating(false);

                } catch (e) { 
                    setIsGenerating(false);
                    console.error(e);
                    setAiError("Darmowe serwery są w tej chwili obciążone. Odczekaj 10 sekund i spróbuj ponownie!");
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Nawigacja Górna */}
                    <nav className="bg-white border-b px-8 py-4 flex justify-between items-center print-hidden sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center space-x-3 font-black text-2xl tracking-tight">
                            <div className="bg-gradient-to-br from-amber-400 to-orange-500 p-2.5 rounded-xl text-white shadow-lg"><Icon name="Layout" size={24}/></div>
                            <span className="text-gray-800">Edu<span className="text-orange-500">Karty</span> <span className="text-xs text-orange-600 ml-1 font-bold bg-orange-50 px-2 py-1 rounded-md border border-orange-200">v2.0 Stabilna</span></span>
                        </div>
                        <div className="flex items-center space-x-4">
                            {!isPremium && (
                                <div className="flex items-center space-x-2 bg-gray-50 p-1.5 rounded-xl border border-gray-200">
                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod Premium..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium text-gray-700"/>
                                    <button onClick={handleVerifyCode} className="p-2 bg-orange-500 hover:bg-orange-600 text-white rounded-lg shadow-sm transition-colors"><Icon name="Key" size={16}/></button>
                                </div>
                            )}
                            <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="flex items-center space-x-2 bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-500 hover:to-yellow-600 text-yellow-900 px-5 py-2.5 rounded-xl font-bold shadow-sm transition-all active:scale-95">
                                <Icon name="Coffee" size={20} /><span>{isPremium ? "Dzięki za Kawę!" : "Postaw Kawę"}</span>
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full print:block print:p-0">
                        
                        {/* PANEL BOCZNY (Narzędzia) */}
                        <div className="lg:col-span-4 space-y-5 print-hidden flex flex-col">
                            
                            <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-5 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1 h-full bg-orange-500"></div>
                                <h2 className="font-bold flex items-center text-gray-800 text-sm uppercase tracking-widest"><Icon name="Type" size={18} className="mr-2 text-orange-500"/> Nagłówek Karty</h2>
                                
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 uppercase ml-1">Tytuł główny</label>
                                    <input type="text" value={worksheetTitle} onChange={e => setWorksheetTitle(e.target.value)} className="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-orange-400 focus:bg-white transition-colors font-bold text-center" />
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 uppercase ml-1">Miejsce na imię</label>
                                    <input type="text" value={worksheetSubtitle} onChange={e => setWorksheetSubtitle(e.target.value)} className="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-orange-400 focus:bg-white transition-colors text-center text-sm" />
                                </div>
                            </div>

                            <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-4 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1 h-full bg-sky-500"></div>
                                <h2 className="font-bold flex items-center text-gray-800 text-sm uppercase tracking-widest"><Icon name="Layout" size={18} className="mr-2 text-sky-500"/> Dodaj Moduły</h2>
                                
                                <button onClick={addMathBlock} className="w-full py-3 px-4 bg-sky-50 hover:bg-sky-100 text-sky-700 rounded-xl font-bold border border-sky-200 flex items-center justify-center gap-2 transition-colors">
                                    <Icon name="Calculator" size={18} /> + Działania Matematyczne
                                </button>
                                <button onClick={addTracingBlock} className="w-full py-3 px-4 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-xl font-bold border border-emerald-200 flex items-center justify-center gap-2 transition-colors">
                                    <Icon name="Type" size={18} /> + Pisanie po śladzie (Szlaczki)
                                </button>
                                <button onClick={addSpacer} className="w-full py-3 px-4 bg-gray-50 hover:bg-gray-100 text-gray-600 rounded-xl font-bold border border-gray-200 flex items-center justify-center gap-2 transition-colors">
                                     + Puste miejsce (Odstęp)
                                </button>
                            </div>

                            {/* Moduł AI */}
                            <div className="bg-gradient-to-br from-purple-50 to-white p-5 rounded-3xl shadow-sm border border-purple-100 space-y-4 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1 h-full bg-purple-500"></div>
                                <h2 className="font-bold flex items-center text-purple-900 text-sm uppercase tracking-widest"><Icon name="Sparkles" size={18} className="mr-2 text-purple-500"/> Kolorowanka AI</h2>
                                
                                {!isPremium ? (
                                    <div className="text-center space-y-3 py-2">
                                        <div className="mx-auto w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center text-purple-500 mb-2">
                                            <Icon name="Lock" size={20} />
                                        </div>
                                        <p className="text-xs text-purple-700 font-medium">Funkcja odblokowana tylko dla posiadaczy Kodu Premium (Postaw Kawę).</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        <textarea 
                                            value={aiPrompt} 
                                            onChange={e => setAiPrompt(e.target.value)} 
                                            placeholder="Wpisz po polsku co ma być na kolorowance (np. Wesoły miś z balonikiem, pszczoła na kwiatku)..." 
                                            className="w-full p-3 border border-purple-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-purple-100 bg-white resize-none"
                                            rows="3"
                                        />
                                        <button onClick={handleGenerateAiImage} disabled={isGenerating} className="w-full bg-purple-600 text-white px-4 py-3 rounded-xl font-bold shadow-md hover:bg-purple-700 disabled:bg-gray-400 transition-colors flex items-center justify-center space-x-2">
                                            {isGenerating ? <span>⏳ Rysowanie (Czekaj)...</span> : <><Icon name="Sparkles" size={18}/><span>Dodaj Kolorowankę</span></>}
                                        </button>
                                        {aiError && (
                                            <div className="p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-xs text-center mt-2">
                                                {aiError}
                                            </div>
                                        )}
                                        <p className="text-[10px] text-purple-400/80 text-center leading-tight">Uwaga: Obrazek wygeneruje się czarno-biały, idealny do pokolorowania przez dzieci.</p>
                                    </div>
                                )}
                            </div>

                            <button onClick={() => window.print()} className="w-full bg-gray-900 hover:bg-gray-800 text-white py-4 rounded-2xl font-black text-sm tracking-widest flex items-center justify-center space-x-3 shadow-xl transition-all active:scale-95 mt-auto">
                                <Icon name="Printer" size={22} /><span>WYDRUKUJ KARTĘ PRACY</span>
                            </button>
                        </div>

                        {/* Obszar Podglądu (Karta A4) */}
                        <div className="lg:col-span-8 flex justify-center items-start print:static overflow-x-auto pb-10">
                            
                            <div 
                                id="print-area"
                                className="relative bg-white w-full max-w-[210mm] aspect-[1/1.414] rounded-sm shadow-2xl p-10 md:p-16 flex flex-col print:shadow-none print:w-[210mm] print:h-[297mm] print:p-12 overflow-hidden"
                            >
                                {/* KROPKOWANA LINIA CIĘCIA TŁA */}
                                <div className="absolute inset-8 border-2 border-dashed border-gray-200 pointer-events-none z-0 opacity-50"></div>

                                {/* Znak wodny */}
                                {!isPremium && <div className="absolute inset-0 z-0 flex items-center justify-center opacity-[0.03] rotate-[-35deg] text-6xl font-black uppercase pointer-events-none select-none tracking-[1rem]">EDUKARTY AI</div>}

                                <div className="relative z-10 flex-shrink-0 mb-8 border-b-2 border-gray-800 pb-6">
                                    <h1 className="text-3xl md:text-4xl font-black text-center text-gray-900 tracking-wider uppercase mb-4">{worksheetTitle}</h1>
                                    <h2 className="text-sm md:text-base text-right text-gray-600 font-medium">{worksheetSubtitle}</h2>
                                </div>

                                {/* BLOKI KARTY PRACY */}
                                <div className="relative z-10 flex-1 flex flex-col gap-6">
                                    {elements.length === 0 && (
                                        <div className="flex-1 flex items-center justify-center border-4 border-dashed border-gray-100 rounded-2xl print-hidden">
                                            <p className="text-gray-400 font-bold text-center px-6">Dodaj moduły z panelu po lewej stronie,<br/>aby zbudować kartę pracy.</p>
                                        </div>
                                    )}

                                    {elements.map((el, index) => (
                                        <div key={el.id} className="relative group p-2 -mx-2 hover:bg-gray-50/50 rounded-xl transition-colors border border-transparent hover:border-gray-100">
                                            
                                            {/* Przycisk Usuń (Tylko na najechanie) */}
                                            <button onClick={() => removeElement(el.id)} className="absolute -right-2 -top-2 print-hidden opacity-0 group-hover:opacity-100 bg-red-500 hover:bg-red-600 text-white rounded-full p-2 shadow-md transition-all z-50">
                                                <Icon name="Trash2" size={14}/>
                                            </button>

                                            {/* RENDEROWANIE BLOKÓW */}
                                            {el.type === 'math' && (
                                                <div className="flex justify-between items-center px-4 py-2">
                                                    {el.data.map((eq, i) => (
                                                        <div key={i} className="math-text text-xl md:text-2xl">{eq}</div>
                                                    ))}
                                                </div>
                                            )}

                                            {el.type === 'tracing' && (
                                                <div className="w-full text-center">
                                                    <input 
                                                        type="text" 
                                                        value={el.text} 
                                                        onChange={(e) => updateElementText(el.id, e.target.value.toUpperCase())}
                                                        className="tracing-text w-full text-center text-3xl md:text-5xl bg-transparent outline-none border-none placeholder-gray-200"
                                                        placeholder="WPISZ TEKST"
                                                    />
                                                </div>
                                            )}

                                            {el.type === 'ai_image' && (
                                                <div className="w-full flex justify-center py-2">
                                                    <img 
                                                        src={el.src} 
                                                        alt="Kolorowanka" 
                                                        className="max-h-64 object-contain mix-blend-multiply drop-shadow-sm" 
                                                        style={{ mixBlendMode: 'multiply' }} 
                                                    />
                                                </div>
                                            )}

                                            {el.type === 'spacer' && (
                                                <div className="w-full h-16 border-2 border-dashed border-gray-200/50 rounded-lg flex items-center justify-center print:border-none print:h-24">
                                                    <span className="text-gray-300 text-xs font-bold uppercase tracking-widest print-hidden">Puste miejsce</span>
                                                </div>
                                            )}

                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
