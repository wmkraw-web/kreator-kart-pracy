<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>EduKarty AI PRO - Kreator Kart Pracy</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Caveat:wght@400..700&family=Comic+Neue:wght@400;700&family=Montserrat:wght@400;700;900&family=Patrick+Hand&display=swap');
        
        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: #f8fafc; overflow-x: hidden; }
        
        /* Szklane panele */
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-nav { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .text-gradient { background: linear-gradient(135deg, #fbbf24 0%, #ea580c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Edytor Karty */
        .worksheet-area { font-family: 'Montserrat', sans-serif; color: #0f172a; }
        .tracing-text { 
            color: transparent; 
            -webkit-text-stroke: 1.5px #cbd5e1; 
            letter-spacing: 0.2em; 
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        input:focus, select:focus, textarea:focus { box-shadow: 0 0 15px rgba(249, 115, 22, 0.3); border-color: #f97316 !important; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; border: none !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; }
            .print-hidden { display: none !important; }
            body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background: white !important; }
            .page-break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            .tracing-text { -webkit-text-stroke: 1.5px #000; }
        }

        /* Animacje Bota */
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .bot-bubble { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes blink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        .bot-eye { animation: blink 4s infinite; transform-origin: center; }
        
        .dark-grid-bg {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                Key: <path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3y-3.5L15.5 7.5z"/>,
                Lock: (<><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>),
                Trash2: (<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>),
                Calculator: (<><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></>),
                Type: (<><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></>),
                Layout: (<><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>),
                Image: (<><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>),
                Text: (<><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="12" x2="3" y2="12"/><line x1="21" y1="18" x2="3" y2="18"/></>),
                Link: (<><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></>),
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || null}</svg>;
        };

        const BotHelperAvatar = () => (
            <svg viewBox="0 0 100 100" className="w-14 h-14 drop-shadow-md flex-shrink-0" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 30 V15" stroke="#94a3b8" strokeWidth="4" strokeLinecap="round"/>
                <circle cx="50" cy="12" r="5" fill="#f59e0b"/>
                <rect x="25" y="30" width="50" height="40" rx="12" fill="#c2410c"/>
                <rect x="32" y="38" width="36" height="22" rx="6" fill="#ffffff"/>
                <circle cx="40" cy="49" r="3.5" fill="#c2410c" className="bot-eye"/>
                <circle cx="60" cy="49" r="3.5" fill="#c2410c" className="bot-eye"/>
                <path d="M 45 56 Q 50 60 55 56" stroke="#c2410c" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
            </svg>
        );

        function App() {
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [toastMessage, setToastMessage] = useState('');
            
            const [botMessage, setBotMessage] = useState("Cześć! Zbuduj kartę pracy dodając klocki z menu, a ja będę podpowiadał Ci na bieżąco!");
            
            const [headerData, setHeaderData] = useState({
                school: 'Przedszkole / Szkoła: .......................................',
                name: 'Imię i nazwisko: ................................................',
                date: 'Data: .................',
                group: 'Grupa/Klasa: .................',
                title: 'KARTA PRACY',
                goal: ''
            });

            const [cardFont, setCardFont] = useState("'Comic Neue', cursive");
            const [elements, setElements] = useState([]);
            
            const [aiPrompt, setAiPrompt] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { 
                    setIsPremium(true); 
                    setAccessCode(''); 
                    showToast('Kod aktywny! Witamy w Premium 🌟');
                    setBotMessage("Odblokowano funkcję Rysowania AI! Teraz model Flux jest do Twojej dyspozycji.");
                } else {
                    showToast('Nieprawidłowy kod dostępu!');
                }
            };

            const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(''), 4000); };

            const updateHeader = (field, value) => setHeaderData({...headerData, [field]: value});
            
            const updateElement = (id, changes) => {
                setElements(elements.map(el => el.id === id ? { ...el, ...changes } : el));
            };
            
            const removeElement = (id) => setElements(elements.filter(el => el.id !== id));

            // Funkcje dodające bloki
            const addInstruction = () => { 
                setElements([...elements, { id: Date.now(), type: 'instruction', text: 'Zadanie 1. Wpisz tutaj treść polecenia dla ucznia...' }]); 
                setBotMessage("Dodano polecenie. Edytuj tekst klikając w niego po prawej stronie!"); 
            };
            const addImageMath = () => { 
                setElements([...elements, { id: Date.now(), type: 'image_math', icon: '🍎', eq1: 3, op: '+', eq2: 2 }]); 
                setBotMessage("Dodałem matematykę obrazkową. Zmień ikonkę (np. na 🚗 lub ⭐) i wpisz liczby na podglądzie po prawej stronie!"); 
            };
            const addMath = () => { 
                setElements([...elements, { id: Date.now(), type: 'math', data: ['5 + 3 = ...', '10 - 4 = ...', '7 + 2 = ...'] }]); 
                setBotMessage("Dodałem słupki matematyczne. Możesz wpisać w nie własne równania, oddzielając je enterem."); 
            };
            const addTracing = () => { 
                setElements([...elements, { id: Date.now(), type: 'tracing', text: 'WPISZ SŁOWO' }]); 
                setBotMessage("Szlaczki z liter. Pisz wielkimi literami, wtedy linia przerywana wygląda najlepiej!"); 
            };

            // Rysowanie z AI
            const handleGenerateAI = async () => {
                if (!aiPrompt.trim()) return showToast('Wpisz co mam narysować!');
                setIsGenerating(true);
                setBotMessage("Pędzel poszedł w ruch! Rysuję Twoją grafikę. To potrwa dosłownie 5 sekund...");

                try {
                    const fullPrompt = `A simple black and white line art coloring book illustration for kids: ${aiPrompt}. Clean white background, thick black outlines, simple flat vector style, no shading, no grayscale, no text, no letters.`;

                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: fullPrompt })
                    });

                    if (!response.ok) throw new Error("Błąd łączenia z API Vercel.");

                    const data = await response.json();
                    
                    setElements([...elements, { id: Date.now(), type: 'ai_image', url: data.imageUrl }]);
                    setBotMessage("Tadaam! ✨ Obrazek wylądował na Twojej karcie pracy! Użyłem na nim trybu multiply, więc jego białe tło zniknęło i idealnie wtapia się w kartkę!");
                    setAiPrompt('');

                } catch (error) {
                    console.error(error);
                    showToast(`Błąd: ${error.message}`);
                    setBotMessage("Ojej, serwer chwilowo odrzucił zapytanie. Spróbuj wygenerować jeszcze raz!");
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col relative overflow-x-hidden">
                    
                    {toastMessage && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-orange-600 text-white px-6 py-3 rounded-2xl shadow-[0_0_30px_rgba(234,88,12,0.4)] font-bold text-sm animate-toast flex items-center gap-3 border border-orange-400">
                            <Icon name="AlertCircle" size={18} /> {toastMessage}
                        </div>
                    )}

                    {isGenerating && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[100] flex flex-col items-center justify-center text-white">
                            <div className="glass-panel p-10 rounded-3xl flex flex-col items-center space-y-6 max-w-sm border border-orange-500/20 shadow-[0_0_50px_rgba(234,88,12,0.2)]">
                                <div className="w-16 h-16 border-4 border-slate-700 border-t-orange-500 rounded-full animate-spin"></div>
                                <div className="text-center">
                                    <h3 className="text-xl font-bold mb-2 text-white">Trwa Szkicowanie...</h3>
                                    <p className="text-xs text-slate-400 font-medium">Model Flux generuje kolorowankę bez tła.</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* GÓRNA NAWIGACJA */}
                    <nav className="fixed top-0 w-full z-50 glass-nav py-4 px-6 print-hidden">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-3 font-extrabold text-xl tracking-tight cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                                <div className="bg-gradient-to-br from-amber-500 to-orange-600 p-2 rounded-xl text-white shadow-[0_0_15px_rgba(245,158,11,0.5)]">
                                    <Icon name="Layout" size={22}/>
                                </div>
                                <span>Edu<span className="text-orange-500">Karty</span> AI</span>
                            </div>
                            
                            <div className="flex items-center space-x-4">
                                {!isPremium && (
                                    <div className="hidden md:flex items-center space-x-2 bg-slate-900 p-1.5 rounded-xl border border-slate-700">
                                        <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod Premium..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium text-white placeholder-slate-500"/>
                                        <button onClick={handleVerifyCode} className="p-2 text-white rounded-lg bg-orange-600 hover:bg-orange-500 transition-colors shadow-md"><Icon name="Lock" size={16}/></button>
                                    </div>
                                )}
                                <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="flex items-center space-x-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white px-5 py-2.5 rounded-xl font-bold transition-all active:scale-95 text-sm shadow-md">
                                    <Icon name="Coffee" size={18} className="text-amber-400"/><span>Postaw Kawę</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* GŁÓWNY WIDOK APLIKACJI */}
                    <div className="max-w-7xl mx-auto px-4 pt-32 pb-24 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full print:block print:p-0 relative z-10">
                        
                        {/* PANEL LEWY - KONTROLKI */}
                        <div className="lg:col-span-4 space-y-6 print-hidden">
                            
                            {/* Konfigurator Dokumentu */}
                            <div className="glass-panel p-6 md:p-8 rounded-[2rem] space-y-5">
                                <h2 className="font-bold flex items-center text-slate-300 text-sm uppercase tracking-widest border-b border-slate-700/50 pb-4">
                                    <Icon name="Type" className="mr-2 text-orange-500" size={18}/> Wygląd Dokumentu
                                </h2>
                                
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-2">Tytuł Karty Pracy</label>
                                    <input type="text" value={headerData.title} onChange={e => updateHeader('title', e.target.value.toUpperCase())} className="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm font-bold focus:border-orange-500 transition-colors" />
                                </div>
                                
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-2">Czcionka Dziecięca</label>
                                    <select value={cardFont} onChange={e => setCardFont(e.target.value)} className="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm appearance-none focus:border-orange-500 transition-colors">
                                        <option value="'Comic Neue', cursive" className="bg-slate-900">Klasyczna (Comic Neue)</option>
                                        <option value="'Caveat', cursive" className="bg-slate-900">Odręczna (Caveat)</option>
                                        <option value="'Patrick Hand', cursive" className="bg-slate-900">Marker (Patrick Hand)</option>
                                        <option value="'Montserrat', sans-serif" className="bg-slate-900">Czytelna (Montserrat)</option>
                                    </select>
                                </div>
                            </div>

                            {/* Narzędziownia */}
                            <div className="glass-panel p-6 md:p-8 rounded-[2rem] space-y-4">
                                <h2 className="font-bold flex items-center text-orange-400 text-sm uppercase tracking-widest border-b border-orange-500/30 pb-4">
                                    <Icon name="Layout" className="mr-2" size={18}/> Klocki Zadań
                                </h2>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={addInstruction} className="py-4 px-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-bold border border-slate-600 text-slate-200 transition-colors flex flex-col items-center gap-2"><Icon name="Text" size={18} className="text-slate-400"/> Polecenie</button>
                                    <button onClick={addTracing} className="py-4 px-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-bold border border-slate-600 text-slate-200 transition-colors flex flex-col items-center gap-2"><Icon name="Type" size={18} className="text-blue-400"/> Szlaczki</button>
                                    <button onClick={addImageMath} className="py-4 px-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-bold border border-slate-600 text-slate-200 transition-colors flex flex-col items-center gap-2"><Icon name="Image" size={18} className="text-amber-400"/> Obrazki (Mat)</button>
                                    <button onClick={addMath} className="py-4 px-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-bold border border-slate-600 text-slate-200 transition-colors flex flex-col items-center gap-2"><Icon name="Calculator" size={18} className="text-emerald-400"/> Liczby (Mat)</button>
                                </div>
                            </div>

                            {/* Generator AI Kolorowanek */}
                            <div className="glass-panel p-6 md:p-8 rounded-[2rem] space-y-5 bg-orange-900/10 border-orange-500/30 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-[0.03] text-orange-400"><Icon name="Sparkles" size={64}/></div>
                                <h2 className="font-bold flex items-center text-orange-400 text-sm uppercase tracking-widest relative z-10">
                                    <Icon name="Sparkles" className="mr-2" size={18}/> Rysowanie AI
                                </h2>
                                
                                {!isPremium ? (
                                    <div className="p-6 rounded-xl border-2 border-dashed border-slate-700 flex flex-col items-center justify-center text-center gap-3 bg-slate-900/50 relative z-10">
                                        <div className="p-3 bg-slate-800 rounded-full"><Icon name="Lock" size={24} className="text-slate-400"/></div>
                                        <div><span className="text-sm font-bold text-slate-300 block mb-1">Moduł Rysowania</span><span className="text-xs text-slate-500">Wpisz kod Premium na górze.</span></div>
                                    </div>
                                ) : (
                                    <div className="space-y-4 relative z-10">
                                        <textarea 
                                            value={aiPrompt} 
                                            onChange={e => setAiPrompt(e.target.value)} 
                                            onFocus={() => setBotMessage("Dla najlepszych efektów używaj krótkich zwrotów! Np. 'Słońce z uśmiechem', 'Mały pociąg', 'Piesek z kością'.")}
                                            placeholder="Napisz, co mam narysować jako kontur na karcie..." 
                                            className="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm focus:border-orange-500 transition-colors placeholder-slate-600 resize-none h-24"
                                        />
                                        <button onClick={handleGenerateAI} disabled={isGenerating} className="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-white py-4 rounded-xl font-black text-sm tracking-widest shadow-[0_0_20px_rgba(249,115,22,0.3)] hover:from-amber-400 hover:to-orange-500 flex justify-center items-center gap-2 transition-all active:scale-95 uppercase disabled:opacity-50">
                                            <Icon name="Sparkles" size={18}/> Rysuj Grafikę (AI)
                                        </button>
                                    </div>
                                )}
                            </div>

                            {/* EduBot Pomocnik */}
                            <div className="p-5 rounded-3xl shadow-lg border flex items-start gap-4 animate-[reveal_0.3s_ease-out] transition-colors bg-slate-800 border-slate-700">
                                <BotHelperAvatar />
                                <div className="flex-1 pt-1">
                                    <h4 className="font-black text-xs uppercase tracking-widest mb-1.5 text-orange-400">EduBot Wychowawca</h4>
                                    <p className="text-sm font-medium leading-relaxed text-slate-300 bot-bubble" key={botMessage}>{botMessage}</p>
                                </div>
                            </div>

                        </div>

                        {/* PANEL PRAWY - PODGLĄD KARTY PRACY (Zawsze biały, bo to kartka papieru!) */}
                        <div className="lg:col-span-8 flex justify-center items-start lg:sticky lg:top-28 self-start print:static w-full relative">
                            <div className="absolute inset-0 dark-grid-bg -z-10 rounded-[3rem] opacity-30 print-hidden"></div>

                            <div className="w-full max-w-[210mm] print:max-w-full">
                                
                                {/* Toolbar Wydruku */}
                                <div className="flex justify-end gap-3 mb-6 print-hidden bg-slate-900/50 p-2 rounded-2xl border border-slate-800 backdrop-blur-md">
                                    <button onClick={() => window.print()} className="w-full bg-orange-600 hover:bg-orange-500 text-white px-6 py-4 rounded-xl font-bold flex items-center justify-center gap-3 transition-all text-sm uppercase tracking-widest shadow-[0_0_20px_rgba(234,88,12,0.3)] active:scale-95">
                                        <Icon name="Printer" size={20}/> Wydrukuj Projekt (Zapisz PDF)
                                    </button>
                                </div>

                                {/* BIAŁA KARTA A4 */}
                                <div id="print-area" className="bg-white text-slate-900 shadow-[0_20px_50px_rgba(0,0,0,0.5)] min-h-[297mm] p-10 md:p-14 rounded-sm flex flex-col worksheet-area" style={{ fontFamily: cardFont }}>
                                    
                                    {/* Nagłówek Szkolny */}
                                    <div className="border-b-2 border-slate-800 pb-4 mb-8">
                                        <div className="flex justify-between text-xs font-bold mb-3"><span>{headerData.school}</span><span>{headerData.name}</span></div>
                                        <div className="flex justify-between text-xs font-bold mb-6"><span>{headerData.date}</span><span>{headerData.group}</span></div>
                                        <h1 className="text-3xl md:text-4xl font-black text-center tracking-wider uppercase mb-2" style={{ fontFamily: "'Montserrat', sans-serif" }}>{headerData.title}</h1>
                                    </div>

                                    {/* OBSZAR ROBOCZY Z KLOCKAMI */}
                                    <div className="flex-1 flex flex-col gap-6">
                                        {elements.length === 0 && (
                                            <div className="flex-1 flex items-center justify-center border-4 border-dashed border-slate-200 rounded-3xl print-hidden opacity-50">
                                                <p className="text-slate-500 font-bold text-center px-6">Pusta karta. Dodaj moduły edukacyjne z panelu bocznego!</p>
                                            </div>
                                        )}

                                        {elements.map((el) => (
                                            <div key={el.id} className="relative group p-4 -mx-4 hover:bg-slate-50 rounded-2xl transition-colors border border-transparent hover:border-slate-200 page-break-inside-avoid">
                                                
                                                {/* Kosz (Ukryty na druku) */}
                                                <button onClick={() => removeElement(el.id)} className="absolute -right-3 -top-3 print-hidden opacity-0 group-hover:opacity-100 bg-red-500 hover:bg-red-600 text-white rounded-full p-2.5 shadow-lg transition-all z-50 active:scale-95"><Icon name="Trash2" size={16}/></button>

                                                {/* MODUŁ: Polecenie */}
                                                {el.type === 'instruction' && (
                                                    <input type="text" value={el.text} onChange={(e) => updateElement(el.id, {text: e.target.value})} className="w-full text-lg font-bold bg-transparent outline-none border-b border-dashed border-slate-300 hover:border-orange-400 focus:border-orange-500 print:border-transparent text-slate-800" style={{ fontFamily: "'Montserrat', sans-serif" }} />
                                                )}

                                                {/* MODUŁ: Szlaczki (Tracing) */}
                                                {el.type === 'tracing' && (
                                                    <div className="w-full text-center py-2">
                                                        <input type="text" value={el.text} onChange={(e) => updateElement(el.id, {text: e.target.value.toUpperCase()})} className="tracing-text w-full text-center text-5xl md:text-6xl bg-transparent outline-none border-b-2 border-dashed border-slate-300 pb-2 hover:border-orange-400 focus:border-orange-500 print:border-transparent" placeholder="WPISZ TEKST" style={{ fontFamily: cardFont }} />
                                                    </div>
                                                )}

                                                {/* MODUŁ: Matematyka Obrazkowa */}
                                                {el.type === 'image_math' && (
                                                    <div className="flex flex-col gap-3 my-4">
                                                        {/* Panel kontrolny (ukryty podczas druku) */}
                                                        <div className="flex items-center justify-center gap-3 text-lg print-hidden bg-slate-100 p-2.5 rounded-xl w-max mx-auto border border-slate-200 shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <input type="text" value={el.icon} onChange={e=>updateElement(el.id, {icon: e.target.value})} className="w-12 text-center bg-white rounded-md border border-slate-300 outline-none focus:border-orange-400" maxLength={2} title="Ikonka (Emoji)" />
                                                            <input type="number" value={el.eq1} onChange={e=>updateElement(el.id, {eq1: Number(e.target.value)})} className="w-14 text-center bg-white rounded-md border border-slate-300 outline-none focus:border-orange-400 font-bold" min={1} max={15} />
                                                            <select value={el.op} onChange={e=>updateElement(el.id, {op: e.target.value})} className="bg-white rounded-md border border-slate-300 outline-none font-bold px-1"><option>+</option><option>-</option></select>
                                                            <input type="number" value={el.eq2} onChange={e=>updateElement(el.id, {eq2: Number(e.target.value)})} className="w-14 text-center bg-white rounded-md border border-slate-300 outline-none focus:border-orange-400 font-bold" min={1} max={15} />
                                                        </div>
                                                        {/* Widok właściwy na kartę */}
                                                        <div className="flex items-center justify-center gap-4 text-3xl md:text-4xl py-2">
                                                            <div className="flex flex-wrap max-w-[200px] justify-end gap-1 leading-none">{Array.from({length: el.eq1}).map((_,i)=><span key={`l_${i}`}>{el.icon}</span>)}</div>
                                                            <span className="font-black text-slate-800 mx-2">{el.op}</span>
                                                            <div className="flex flex-wrap max-w-[200px] justify-start gap-1 leading-none">{Array.from({length: el.eq2}).map((_,i)=><span key={`r_${i}`}>{el.icon}</span>)}</div>
                                                            <span className="font-black text-slate-800 mx-2">=</span>
                                                            <span className="w-20 border-b-2 border-slate-500"></span>
                                                        </div>
                                                    </div>
                                                )}

                                                {/* MODUŁ: Matematyka Zwykła */}
                                                {el.type === 'math' && (
                                                    <div className="w-full my-2 text-2xl font-bold text-slate-800 px-6">
                                                        <textarea value={el.data.join('\n')} onChange={e => updateElement(el.id, {data: e.target.value.split('\n')})} className="w-full bg-transparent outline-none border border-dashed border-slate-300 hover:border-orange-400 focus:border-orange-500 rounded-xl p-4 print:border-none print:p-0 resize-none leading-loose text-center md:text-left" rows={el.data.length || 1} style={{fontFamily: cardFont}} />
                                                    </div>
                                                )}

                                                {/* MODUŁ: Grafika z AI (Flux) */}
                                                {el.type === 'ai_image' && (
                                                    <div className="w-full flex justify-center my-6 relative">
                                                        <img src={el.url} className="max-w-[80%] max-h-[300px] object-contain drop-shadow-sm" style={{mixBlendMode: 'multiply'}} />
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
